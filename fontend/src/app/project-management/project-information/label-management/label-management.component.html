<div class="main-container-dialog">
    <div mat-dialog-title class="add-member-title">
        <h1 class="text-title">Add New Label</h1>
        <div class="div-task-function">
            <span [mat-dialog-close]="true">
                <i class="pi pi-times"></i>
            </span>
        </div>
    </div>
    <form [formGroup]="addNewLabelForm" (ngSubmit)="addNewLabel()">
        <div mat-dialog-content class="main-content">
            <div class="div-label-name">
                <label class="label-tittle text-title">Label Name</label>
                <input type="text" pInputText placeholder="Label Name" [style]="{'width':'100%'}" [ngClass]="{ 'ng-invalid ng-dirty': submitted && f.labelName.invalid && f.color.errors}"  formControlName="labelName">
                <div class="p-col-12"><small *ngIf="submitted && f.labelName.invalid" id="username-help" class="p-error">Label name is invalid.</small></div>
            </div>
            <div class="div-label-color">
                <label class="label-tittle text-title">Label Color</label>
                <p>Choose Color <p-colorPicker [showTransitionOptions]="'0ms'"
                        formControlName="color" format="hex" [ngClass]="{ 'ng-invalid ng-dirty': f.color.errors }"></p-colorPicker>
                </p>
                <div class="p-col-12"><small *ngIf="submitted && f.color.errors" id="username-help" class="p-error">Color is required! Choose Color for label</small></div>
            </div>
        </div>
        <div class="button-add">
            <button pButton pRipple type="button" class="p-button-rounded" label="Add Label" (click)="addNewLabel()"></button>
        </div>
    </form>
</div>
